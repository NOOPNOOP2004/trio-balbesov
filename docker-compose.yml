services:
  people-counter:
    build: .
    container_name: people-counter
    environment:
      # ИСПРАВЛЕНО: headless-режим — cv2.imshow не вызывается, нет краша без дисплея
      - HEADLESS=1
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - ./models:/app/models
      # Положи видеофайл рядом с docker-compose.yml и он будет доступен внутри
      - ./video.mp4:/app/video.mp4:ro
    stdin_open: true
    tty: true
    # Запуск с видеофайлом. Для камеры — см. профиль "camera" ниже.
    command: python people_counter_robust.py --source video.mp4 --no-multiscale

  # Профиль для запуска с веб-камерой (только Linux-хост):
  #   docker compose --profile camera up people-counter-cam
  people-counter-cam:
    profiles: ["camera"]
    build: .
    container_name: people-counter-cam
    environment:
      - HEADLESS=1
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - ./models:/app/models
    devices:
      # ИСПРАВЛЕНО: явный проброс устройства камеры — без этого --camera 0 не работает
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
    command: python people_counter_robust.py --camera 0 --no-multiscale
